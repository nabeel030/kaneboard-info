<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Kaneboard app icon – flow arrow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CDB"/>
      <stop offset="100%" stop-color="#3B1F8C"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Kanban columns -->
  <g fill="white" opacity="0.9">
    <rect x="18" y="26" width="13" height="38" rx="5"/>
    <rect x="37" y="18" width="13" height="46" rx="5"/>
    <rect x="56" y="32" width="13" height="32" rx="5"/>
  </g>

  <!-- Flow arrow sweeping across the bottom -->
  <path d="M18 74 Q50 90 75 66" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <polygon points="75,60 82,68 70,70" fill="white" opacity="0.85"/>
</svg>
